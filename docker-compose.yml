version: "3.7"

services:
  breedbase:
    image: breedbase/breedbase:latest
    container_name: breedbase_web_cassbase
    ports:
      - 8946:8080
    volumes:
      - type: bind
        source: /export/prod/public_cassbase
        target: /home/production/volume
#      - type: bind
#        source: /home/production/test_cass_sgn
#        target: /home/production/cxgn/sgn
      - type: bind
        source: sgn_local.conf
        target: /home/production/cxgn/sgn/sgn_local.conf
      - type: bind
        source: db_dumps
        target: /db_dumps
      - type: bind
        source: crontab
        target: /etc/crontab
      - type: bind
        source: bash_history
        target: /home/production/.bash_history




